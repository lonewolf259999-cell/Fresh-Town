<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fresh Town Police</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://docs.google.com">
<link rel="dns-prefetch" href="https://docs.google.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Inter',sans-serif;
    background:#0d1117;
}
.glass-card{
    background:rgba(22,27,34,.8);
    backdrop-filter:blur(10px);
}
.neon-border{
    border-bottom:2px solid #2ecc71;
    box-shadow:0 4px 15px rgba(46,204,113,.2);
}
.loading{
    border-radius:50%;
    width:24px;
    height:24px;
    border:3px solid rgba(255,255,255,.1);
    border-top-color:#2ecc71;
    animation:spin 1s linear infinite;
}
table{
    border-collapse:collapse;
}
tr{transition:.15s ease}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body class="text-gray-300 min-h-screen p-4 md:p-10">

<div class="max-w-5xl mx-auto">

<!-- HEADER -->
<div class="text-center mb-10">
<h1 class="text-xl md:text-3xl font-extrabold text-white uppercase">
Fresh Town Police
</h1>

<div class="relative max-w-md mx-auto mt-6">
<input id="searchInput"
placeholder="พิมพ์ชื่อหรือยศเพื่อค้นหา..."
class="w-full bg-[#161b22] border-2 border-green-500/30 rounded-full py-2 md:py-3 px-4 md:px-12 text-sm md:text-base">

<div id="loader" class="absolute right-4 top-3.5 hidden">
<div class="loading"></div>
</div>
</div>
</div>

<!-- TABLE -->
<div class="glass-card rounded-xl overflow-hidden shadow-2xl">
<table class="w-full table-fixed">

<thead class="text-green-500 uppercase text-sm font-bold neon-border">
<tr>
<th class="px-6 py-3 text-left w-[55%]">👤 NAME</th>
<th class="px-6 py-3 text-left w-[25%]">🎖️ RANK</th>
<th class="px-6 py-3 text-right w-[20%]">📂 CASE</th>
</tr>
</thead>

<tbody id="tableBody" class="divide-y divide-gray-800"></tbody>

</table>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
/* ================= CONFIG ================= */
const csvUrl =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTufyS20gYs7kwAw7NhumKGtOjh3pIYM0eRvL7xYJnpfkfrRs1hcw5QKDeCzrLwkz78k6w0FSzAK5_S/pub?output=csv";

const CACHE_KEY="FTPD_CACHE_V3";
const CACHE_TIME=60000;

let allData=[];
const tableBody=document.getElementById("tableBody");

/* ================= ERROR GUARD ================= */
window.addEventListener("error",e=>{
console.error("APP ERROR:",e.message);
});

/* ================= FETCH DATA ================= */
async function fetchData(){

const loader=document.getElementById("loader");
const cacheRaw=localStorage.getItem(CACHE_KEY);

/* USE CACHE */
if(cacheRaw){
const cache=JSON.parse(cacheRaw);

allData=cache.data;
renderTable(allData);

if(Date.now()-cache.time<CACHE_TIME) return;

refreshBackground();
return;
}

/* FIRST LOAD */
loader.classList.remove("hidden");

Papa.parse(csvUrl,{
download:true,
complete:(results)=>{

allData=results.data.slice(3)
.map(r=>({
name:(r[4]||"").trim(),
rank:(r[5]||"").trim(),
case:(r[6]||"0").trim()
}))
.filter(x=>x.name);

localStorage.setItem(CACHE_KEY,JSON.stringify({
time:Date.now(),
data:allData
}));

renderTable(allData);
loader.classList.add("hidden");
},
error:()=>{
tableBody.innerHTML=
`<tr><td colspan="3" class="text-center py-10 text-red-400">
โหลดข้อมูลไม่สำเร็จ
</td></tr>`;
}
});
}

/* ================= BACKGROUND REFRESH ================= */
function refreshBackground(){

Papa.parse(csvUrl,{
download:true,
complete:(res)=>{

const newData=res.data.slice(3)
.map(r=>({
name:(r[4]||"").trim(),
rank:(r[5]||"").trim(),
case:(r[6]||"0").trim()
}))
.filter(x=>x.name);

localStorage.setItem(CACHE_KEY,JSON.stringify({
time:Date.now(),
data:newData
}));
}
});
}

/* ================= RENDER ================= */
function renderTable(data){

requestAnimationFrame(()=>{

if(data.length===0){
tableBody.innerHTML=
`<tr><td colspan="3" class="text-center py-10 text-gray-500">
--- ไม่พบข้อมูล ---
</td></tr>`;
return;
}

tableBody.innerHTML=data.map(item=>`
<tr class="hover:bg-white/5 border-b border-gray-800">
<td class="px-6 py-4 font-semibold text-green-400 truncate">
<a href="profile.html?name=${encodeURIComponent(item.name)}">
${item.name}
</a>
</td>

<td class="px-6 py-4 text-left text-gray-400">
${item.rank||"-"}
</td>
<td class="px-6 py-4 text-right font-mono tabular-nums text-green-400 ">
${item.case||"0"}
</td>
</tr>
`).join("");
});
}

/* ================= SEARCH ================= */
searchInput.addEventListener("input",e=>{
const term=e.target.value.toLowerCase().trim();

const filtered=allData.filter(item=>
item.name.toLowerCase().includes(term) ||
item.rank.toLowerCase().includes(term)
);

renderTable(filtered);
});

/* ================= FAIL SAFE ================= */
setTimeout(()=>{
if(allData.length===0){
tableBody.innerHTML=
`<tr><td colspan="3" class="text-center py-10 text-yellow-400">
⚠ โหลดข้อมูลช้า กรุณารีเฟรช
</td></tr>`;
}
},8000);

fetchData();
</script>
</body>
</html>
