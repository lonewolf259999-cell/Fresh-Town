<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTPD CASE SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; }
        .glass-card { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); }
        .neon-border { border-bottom: 2px solid #2ecc71; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.2); }
        .loading { border-radius: 50%; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #2ecc71; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-300 min-h-screen p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center p-3 mb-4">
                <svg class="w-10 h-10 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                </svg>
                <h1 class="text-3xl font-extrabold text-white ml-3 tracking-wider uppercase">FTPD CASE SYSTEM</h1>
            </div>

            <div class="relative max-w-md mx-auto">
                <input type="text" id="searchInput" 
                    placeholder="พิมพ์ชื่อหรือยศเพื่อค้นหา..." 
                    class="w-full bg-[#161b22] border-2 border-green-500/30 rounded-full py-3 px-12 focus:outline-none focus:border-green-500 transition-all text-white shadow-lg">
                <svg class="w-5 h-5 absolute left-4 top-3.5 text-green-500/50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <div id="loader" class="absolute right-4 top-3.5 hidden"><div class="loading"></div></div>
            </div>
        </div>

        <div class="glass-card rounded-xl overflow-hidden shadow-2xl">
            <table class="w-full text-left">
                <thead class="text-green-500 uppercase text-sm font-bold neon-border">
                    <tr>
                        <th class="px-6 py-4">👤 NAME</th>
                        <th class="px-6 py-4 text-center">🎖️ RANK</th>
                        <th class="px-6 py-4 text-right">📂 CASE</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-gray-800">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTufyS20gYs7kwAw7NhumKGtOjh3pIYM0eRvL7xYJnpfkfrRs1hcw5QKDeCzrLwkz78k6w0FSzAK5_S/pub?output=csv"; 
    let allData = [];

    async function fetchData() {
        const loader = document.getElementById('loader');
        loader.classList.remove('hidden');

        Papa.parse(csvUrl, {
            download: true,
            complete: function(results) {
                const rawRows = results.data;
                
                // เริ่มอ่านแถวที่ 4 (Index 3), คอลัมน์ E=4, F=5, G=6
                allData = rawRows.slice(3) 
                    .map(row => ({
                        "name": row[4] ? String(row[4]).trim() : "", 
                        "rank": row[5] ? String(row[5]).trim() : "", 
                        "case": row[6] ? String(row[6]).trim() : "0"
                    }))
                    .filter(item => item.name !== ""); 

                renderTable(allData);
                loader.classList.add('hidden');
            },
            error: function(err) {
                console.error("Error:", err);
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="3" class="text-center py-10 text-red-400">เกิดข้อผิดพลาดในการโหลดข้อมูล</td></tr>`;
            }
        });
    }

function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="3" class="text-center py-10 text-gray-500">--- ไม่พบข้อมูลที่ค้นหา ---</td></tr>`;
        return;
    }
    tbody.innerHTML = data.map(item => `
        <tr class="hover:bg-white/5 transition-colors border-b border-gray-800">
            <td class="px-6 py-4 font-semibold text-green-400">
                <a href="profile.html?name=${encodeURIComponent(item.name)}" class="hover:underline">
                    ${item.name}
                </a>
            </td>
            <td class="px-6 py-4 text-center text-gray-400 text-sm">${item.rank || "-"}</td>
            <td class="px-6 py-4 text-right font-mono text-xl text-white">${item.case || "0"}</td>
        </tr>
    `).join('');
}

    // --- ส่วนที่ปรับปรุงใหม่: ระบบค้นหาที่แม่นยำขึ้น ---
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const searchTerm = e.target.value.toLowerCase().trim();
        
        const filtered = allData.filter(item => {
            const nameMatch = item.name.toLowerCase().includes(searchTerm);
            const rankMatch = item.rank.toLowerCase().includes(searchTerm);
            // คืนค่าถ้าเจอในชื่อ หรือ เจอในยศ
            return nameMatch || rankMatch;
        });
        
        renderTable(filtered);
    });

    fetchData();
</script>
</body>
</html>
