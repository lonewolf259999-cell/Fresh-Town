<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - FTPD System</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>
@media (max-width:640px){
  .stat-card{
    padding:14px;
  }
  .stat-card h2{
    font-size:20px;
  }
}
    
body{
    font-family:'Inter',sans-serif;
    background:#0d1117;
    color:white;
}

.stat-card{
    background:#161b22;
    border:1px solid #30363d;
    border-radius:12px;
    padding:20px;
    transition:.25s;
}
.stat-card:hover{
    border-color:#2ecc71;
    transform:translateY(-4px);
}

.btn-week{
    background:#21262d;
    border:1px solid #30363d;
    padding:8px 16px;
    border-radius:8px;
    cursor:pointer;
}

.btn-week.active{
    background:#238636;
}

.week-badge{
    display:inline-block;
    padding:3px 10px;
    margin:4px;
    border-radius:999px;
    font-weight:bold;
    background:#22c55e20;
    border:1px solid #22c55e55;
    color:#22c55e;
}

.btn-week{ 
    white-space:nowrap; 
    font-size:15px; 
    padding:6px 14px; 
}
</style>
</head>

<body class="p-4 md:p-10">

<div class="max-w-4xl mx-auto">

<a href="index.html" class="text-green-400 hover:underline">
← กลับหน้าหลัก
</a>

<div class="text-center mb-10">
<h1 id="userName"
class="text-2xl md:text-4xl font-extrabold uppercase">
กำลังโหลด...
</h1>

<div class="text-sm md:text-xl mt-3 flex flex-col md:block gap-2">
ยศ :
<span id="userRank" class="px-3 py-1 bg-green-500/10 text-green-400 rounded-full border border-green-500/20 text-2xl font-bold uppercase">...</span>
|
รวมเคส :
<span id="totalLifetime" class="px-3 py-1 bg-green-500/10 text-green-400 rounded-full border border-green-500/20 text-2xl font-bold uppercase">0</span>
</div>

<div id="unpaidMonths"
class="mt-5 text-red-400 font-semibold">
กำลังตรวจสอบเงินเดือน...
</div>
</div>

<div id="weekSelector"
class="flex flex-wrap gap-2 mb-6 justify-center"></div>

<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 md:gap-4 ">

<div class="stat-card"><p>เทค 2</p><h2 id="val1">0</h2></div>
<div class="stat-card"><p>คดีปกติ</p><h2 id="val2">0</h2></div>
<div class="stat-card"><p>ทำคดี</p><h2 id="val3">0</h2></div>
<div class="stat-card"><p>รถยอด</p><h2 id="val4">0</h2></div>
<div class="stat-card"><p>คุมสอบ</p><h2 id="val5">0</h2></div>

<div class="stat-card bg-green-500/5 border-green-500/40">
<p>รวมอาทิตย์นี้</p>
<h2 id="valTotal" class="text-3xl font-bold">0</h2>
</div>

<div class="stat-card bg-yellow-500/5 border-yellow-400/40">
<p>เงินรายอาทิตย์</p>
<h2 id="valMoney" class="text-3xl font-bold">0</h2>
</div>

<div class="stat-card bg-blue-500/5 border-blue-400/40">
<p>สถานะ</p>
<h2 id="valPaidStatus">ตรวจสอบ...</h2>
<button id="paidBtn"
class="mt-3 px-4 py-2 bg-green-600 hover:bg-green-700 rounded-lg text-sm font-bold">
✅ จ่ายแล้ว
</button>
</div>

</div>
</div>

<script>
const params = new URLSearchParams(location.search);
const targetName = (params.get("name")||"").trim();

document.getElementById("userName").innerText =
targetName || "ไม่พบชื่อ";

const spreadsheetId =
"1QnXWv7QIh4QdaeNcMR6sybUMt9Sd3vzmU6Id6Fz8UiQ";

const PAID_API ="https://script.google.com/macros/s/AKfycby-Yv4EBdX5J2yy-dZR4X4BIPqPf47jazJmtd-O5-4yW2FVGXbIacWzy1dCPdhMHKrPBA/exec";



const baseCsv =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTufyS20gYs7kwAw7NhumKGtOjh3pIYM0eRvL7xYJnpfkfrRs1hcw5QKDeCzrLwkz78k6w0FSzAK5_S/pub?output=csv";

let weekList = [];
let currentWeek = "";





/* =========================
   โหลดข้อมูลหลักครั้งเดียว
=========================*/
Papa.parse(baseCsv,{
download:true,
complete:(res)=>{

const rows = res.data.slice(3);

const user = rows.find(r =>
(r[4]||"").trim() === targetName
);

if(user){
userRank.innerText = user[5] || "-";
totalLifetime.innerText = user[6] || "0";
}

weekList = rows.map(r=>r[8]).filter(Boolean);

createWeekButtons();
checkUnpaid();
}
});


/* =========================
   ปุ่มเลือกสัปดาห์
=========================*/
function createWeekButtons(){
const box=document.getElementById("weekSelector");
box.innerHTML="";

weekList.forEach(week=>{
const btn=document.createElement("button");
btn.className="btn-week";
btn.innerText=week;

btn.onclick=()=>{
document
.querySelectorAll(".btn-week")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");
loadWeek(week);
};

box.appendChild(btn);
});
// สั่งให้คลิกปุ่มสุดท้าย (สัปดาห์ล่าสุด) โดยอัตโนมัติ
    if (weekList.length > 0) {
        const buttons = box.querySelectorAll(".btn-week");
        buttons[buttons.length - 1].click(); 
    }
}


/* =========================
   โหลดข้อมูลรายสัปดาห์
=========================*/
function loadWeek(sheet){

currentWeek = sheet;
    
const url=
`https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheet)}`;

Papa.parse(url,{
download:true,
complete:(res)=>{

const row=res.data.find(r=>
(r[0]||"")
.toLowerCase()
.includes(targetName.toLowerCase())
);

if(!row) return;

val1.innerText=row[2]||0;
val2.innerText=row[3]||0;
val3.innerText=row[4]||0;
val4.innerText=row[5]||0;
val5.innerText=row[6]||0;
valTotal.innerText=row[10]||0;

const money=Number(
(row[16]||"0").replace(/,/g,"")
);

valMoney.innerText=
money.toLocaleString("th-TH");

if((row[17]||"").toLowerCase()==="true"){
valPaidStatus.innerText="✅ จ่ายแล้ว";
valPaidStatus.className="text-green-400";
}else{
valPaidStatus.innerText="❌ ยังไม่จ่าย";
valPaidStatus.className="text-red-400";
}
}
});
}


/* =========================
   ตรวจเงินค้าง (เร็วขึ้น)
=========================*/
async function checkUnpaid(){

let unpaid=[];

for(const week of weekList){

const url=
`https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(week)}`;

await new Promise(done=>{
Papa.parse(url,{
download:true,
complete:(res)=>{

const row=res.data.find(r=>
(r[0]||"")
.toLowerCase()
.includes(targetName.toLowerCase())
);

if(row && (row[17]||"").toLowerCase()!=="true"){
unpaid.push(week);
}

done();
}
});
});
}

const box=document.getElementById("unpaidMonths");

if(unpaid.length===0){
    // เพิ่ม mt-8 หรือ mt-10 เข้าไปเพื่อให้มันเว้นระยะจากด้านบนครับ
    box.className="mt-5 text-green-400 font-bold"; 
    box.innerText="✅ รับเงินครบแล้ว";
}else{
    // สำหรับกรณีที่ยังไม่ได้รับเงิน ก็ควรใส่ mt-8 ไว้ด้วยเพื่อให้ตำแหน่งเท่ากัน
    box.className="mt-8 text-red-400 font-semibold";
    box.innerHTML=
    "⚠ ยังไม่ได้รับเงิน<br>"+
    unpaid.map(w=>`<span class="week-badge">${w}</span>`).join("");
}
}

document.getElementById("paidBtn").onclick = async () => {

  if(!currentWeek){
    alert("กรุณาเลือกสัปดาห์ก่อน");
    return;
  }

  const pin = prompt("กรุณาใส่ PIN");

  if(!pin) return;

  const btn = document.getElementById("paidBtn");
  btn.innerText = "กำลังบันทึก...";
  btn.disabled = true;

  try{

    const res = await fetch(PAID_API,{
      method:"POST",
      body: JSON.stringify({
        name: targetName,
        week: currentWeek,
        pin: pin
      })
    });

    const data = await res.json();

    if(data.success){
      valPaidStatus.innerText="✅ จ่ายแล้ว";
      valPaidStatus.className="text-green-400";
      alert("บันทึกสำเร็จ");
      location.reload();
    }else{
      alert(data.message || "ไม่สำเร็จ");
    }

  }catch(e){
    alert("เชื่อมต่อ Apps Script ไม่ได้");
  }

  btn.innerText="✅ จ่ายแล้ว";
  btn.disabled=false;
};

</script>

</body>
</html>
